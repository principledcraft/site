<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <style>
      /* latin-ext */
      @font-face {
        font-family: 'Roboto Slab';
        font-style: normal;
        font-weight: 400 700;
        font-display: swap;
        src: url('/fonts/roboto-slab-latin-ext.woff2') format('woff2');
        unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
      }
      /* latin */
      @font-face {
        font-family: 'Roboto Slab';
        font-style: normal;
        font-weight: 400 700;
        font-display: swap;
        src: url('/fonts/roboto-slab-latin.woff2') format('woff2');
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }
    </style>
  </head>
  <body
    style='font-family:"Roboto Slab",serif; height:100vh; text-align:center; display:flex; flex-direction:column; align-items:center; justify-content:center; margin:0'
  >
    <style>
      body {
        color: #000;
        background: #fff;
      }
      .hextra-error-h1 {
        border-right: 1px solid rgba(0, 0, 0, 0.3);
      }
      a { color: inherit; text-decoration: none; }
      a:hover { opacity: 0.8; }
      @media (prefers-color-scheme: dark) {
        body {
          color: #fff;
          background: #000;
        }
        .hextra-error-h1 {
          border-right: 1px solid rgba(255, 255, 255, 0.3);
        }
      }
    </style>
    <a href="/" style="display:flex; align-items:center; gap:8px; margin-bottom:32px">
      <img src="/favicon-96x96.png" alt="" style="height:56px; width:auto; border-radius:50%">
      <span style="font-size:24px; font-weight:600">// principled craft .dev</span>
    </a>
    <main id="content" style="display:flex; align-items:center">
      <h1
        class="hextra-error-h1"
        style='display:inline-block; margin:0 20px 0 0; padding-right:23px; font-size:24px; font-weight:500; vertical-align:top; line-height:49px'
      >
        404
      </h1>
      <div style="display:inline-block; text-align:left">
        <h2 style="font-size:14px; font-weight:400; line-height:49px; margin:0">This page could not be found.</h2>
      </div>
    </main>
  </body>
</html>
