<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@400;500;600&display=swap" rel="stylesheet">
  </head>
  <body
    style='font-family:"Roboto Slab",serif; height:100vh; text-align:center; display:flex; flex-direction:column; align-items:center; justify-content:center; margin:0'
  >
    <style>
      body {
        color: #000;
        background: #fff;
      }
      .hextra-error-h1 {
        border-right: 1px solid rgba(0, 0, 0, 0.3);
      }
      a { color: inherit; text-decoration: none; }
      a:hover { opacity: 0.8; }
      @media (prefers-color-scheme: dark) {
        body {
          color: #fff;
          background: #000;
        }
        .hextra-error-h1 {
          border-right: 1px solid rgba(255, 255, 255, 0.3);
        }
      }
    </style>
    <a href="/" style="display:flex; align-items:center; gap:8px; margin-bottom:32px">
      <img src="/favicon-96x96.png" alt="" style="height:56px; width:auto; border-radius:50%">
      <span style="font-size:24px; font-weight:600">// principled craft .dev</span>
    </a>
    <main id="content" style="display:flex; align-items:center">
      <h1
        class="hextra-error-h1"
        style='display:inline-block; margin:0 20px 0 0; padding-right:23px; font-size:24px; font-weight:500; vertical-align:top; line-height:49px'
      >
        404
      </h1>
      <div style="display:inline-block; text-align:left">
        <h2 style="font-size:14px; font-weight:400; line-height:49px; margin:0">This page could not be found.</h2>
      </div>
    </main>
  </body>
</html>
