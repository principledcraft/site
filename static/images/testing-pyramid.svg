<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>

  <!-- Pyramid: apex (300,50), base (140,310)-(460,310) -->
  <!-- Thirds at y=137 and y=223 -->
  <!-- At y=137: x_left=246, x_right=354 -->
  <!-- At y=223: x_left=193, x_right=407 -->

  <!-- Unit tests (bottom trapezoid) -->
  <polygon points="193,223 407,223 460,310 140,310" fill="#dbeafe" stroke="#6b9bd2" stroke-width="2"/>
  <!-- Integration (middle trapezoid) -->
  <polygon points="246,137 354,137 407,223 193,223" fill="#e0e7ff" stroke="#818cf8" stroke-width="2"/>
  <!-- E2E (top triangle) -->
  <polygon points="300,50 354,137 246,137" fill="#ede9fe" stroke="#a78bfa" stroke-width="2"/>

  <!-- Labels -->
  <text x="300" y="275" text-anchor="middle" font-size="15" font-weight="600" fill="#1e3a5f">Unit</text>
  <text x="300" y="188" text-anchor="middle" font-size="15" font-weight="600" fill="#3730a3">Integration</text>
  <text x="300" y="105" text-anchor="middle" font-size="15" font-weight="600" fill="#5b21b6">E2E</text>

  <!-- Cost arrow (left) -->
  <line x1="105" y1="310" x2="105" y2="50" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="105" y="38" text-anchor="middle" font-size="13" font-weight="600" fill="#555">Cost</text>

  <!-- Speed arrow (right) -->
  <line x1="495" y1="50" x2="495" y2="310" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="495" y="335" text-anchor="middle" font-size="13" font-weight="600" fill="#555">Speed</text>
</svg>
