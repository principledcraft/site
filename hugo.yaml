# Hugo configuration file
title: // principled craft .dev

# import hextra as module
module:
  imports:
    - path: github.com/imfing/hextra

markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false

menu:
  main:
    - identifier: principles
      name: Principles
      pageRef: /principles
      weight: 1
    - name: Books
      pageRef: /books
      weight: 2
    - name: Blog
      pageRef: /blog
      weight: 4
    - name: About
      pageRef: /about
      weight: 5
    - name: Search
      weight: 7
      params:
        type: search
    - name: GitHub
      weight: 8
      url: "https://github.com/principledcraft"
      params:
        icon: github
    - name: Theme Toggle
      weight: 9
      params:
        type: theme-toggle

params:
  page:
    width: wide
  navbar:
    displayTitle: true
    displayLogo: true
    logo:
      path: android-chrome-192x192.png
      link: /
      width: 55
      height: 55
    width: wide
  theme:
    default: light
    displayToggle: false

  footer:
    displayCopyright: true
    displayPoweredBy: false
